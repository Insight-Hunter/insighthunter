name: Kernel Package

on:
  push:
    paths:
      - "packages/kernel/**"
      - "turbo.json"
      - "tsconfig.base.json"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/kernel.yml"
  pull_request:
    paths:
      - "packages/kernel/**"
      - "turbo.json"
      - "tsconfig.base.json"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/kernel.yml"

jobs:
  kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint kernel
        run: pnpm --filter @insighthunter/kernel lint

      - name: Typecheck kernel
        run: pnpm --filter @insighthunter/kernel typecheck

      - name: Test kernel
        run: pnpm --filter @insighthunter/kernel test

      - name: Build kernel
        run: pnpm --filter @insighthunter/kernel build
