name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Workers
    runs-on: ubuntu-latest
    needs: []

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # ─── Database migrations ──────────────────────────────────────────────
      - name: Apply ledger migrations
        run: |
          pnpm wrangler d1 execute insighthunter-ledger \
            --file packages/database/migrations/0003_accounting_core.sql \
            --remote

      - name: Apply main migrations
        run: |
          pnpm wrangler d1 execute insighthunter-main \
            --file packages/database/migrations/0004_onboarding.sql \
            --remote

      - name: Apply dispatch migrations
        run: |
          pnpm wrangler d1 execute insighthunter-dispatch \
            --file packages/database/migrations/0005_tenants.sql \
            --remote

      # ─── Workers (dependency order) ───────────────────────────────────────
      - name: Deploy insighthunter-auth
        run: pnpm --filter @insighthunter/auth wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-ledger
        run: pnpm --filter @insighthunter/ledger wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-finops
        run: pnpm --filter @insighthunter/finops wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-advisor
        run: pnpm --filter @insighthunter/advisor wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-bizforma
        run: pnpm --filter @insighthunter/bizforma wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-dispatch
        run: pnpm --filter @insighthunter/insighthunter-dispatch wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-gateway
        run: pnpm --filter @insighthunter/gateway wrangler deploy
        working-directory: ${{ github.workspace }}

      - name: Deploy insighthunter-main
        run: pnpm --filter @insighthunter/insighthunter-main wrangler deploy
        working-directory: ${{ github.workspace }}
