name = "insighthunter-api"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public/dashboard"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-main"
database_id = "04854880-81f5-4c02-b555-905a34492b92"
migrations_dir = "migrations"

[[d1_databases]]
binding = "insighthunter_main"
database_name = "insighthunter-main"
database_id = "04854880-81f5-4c02-b555-905a34492b92"
remote = true

[[d1_databases]]
binding = "insighthunter_preview"
database_name = "insighthunter-preview"
database_id = "ea438ef9-559b-4b94-ad70-e418bc4e896d"
remote = true

[[kv_namespaces]]
binding = "SESSIONS"
id = "60e34ba310ca40c79edec05470c7a271"
preview_id = "9705276c312c48a7a83270766c1a1c9e"

[[kv_namespaces]]
binding = "CONFIG"
id = "479b958c6592458eb7f40ebfdd274d0e"
preview_id = "8b381223d0e142f4b08e2fc9485b3768"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "insighthunter-documents"

[[r2_buckets]]
binding = "EXPORTS"
bucket_name = "insighthunter-exports"

[[r2_buckets]]
binding = "insighthunter_documents"
bucket_name = "insighthunter-documents"
remote = true

[[r2_buckets]]
binding = "insighthunter_exports"
bucket_name = "insighthunter-exports"
remote = true

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "insighthunter-email"

[[queues.producers]]
binding = "PAYROLL_QUEUE"
queue = "insighthunter-payroll"

[[queues.producers]]
binding = "EXPORT_QUEUE"
queue = "insighthunter-exports"

[[queues.consumers]]
queue = "insighthunter-email"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[queues.consumers]]
queue = "insighthunter-payroll"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2

[[queues.consumers]]
queue = "insighthunter-exports"
max_batch_size = 1
max_batch_timeout = 60
max_retries = 2

[[durable_objects.bindings]]
name = "PBX_ROOM"
class_name = "PBXRoom"
script_name = "insighthunter-api"

[[durable_objects.bindings]]
name = "AI_SESSION"
class_name = "AISession"
script_name = "insighthunter-api"

[[migrations]]
tag = "v1"
new_classes = ["PBXRoom", "AISession"]

[ai]
binding = "AI"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "insighthunter_events"

[[vectorize]]
binding = "VECTORS"
index_name = "insighthunter-insights"

[[vectorize]]
binding = "VECTORIZE"
index_name = "insighthunter-insights"
remote = true

[triggers]
crons = [
  "0 8 * * 1",
  "0 9 1 * *",
  "0 12 * * *",
  "*/15 * * * *"
]

[vars]
ENVIRONMENT = "production"
APP_NAME = "Insight Hunter"
APP_URL = "https://app.insighthunter.com"
ALLOWED_ORIGINS = "https://insighthunter.com,https://app.insighthunter.com"
SESSION_TTL_SECONDS = "86400"
MAX_UPLOAD_MB = "25"
PLAN_FREE_TX_LIMIT = "100"
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

[env.preview]
name = "insighthunter-api-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
APP_URL = "https://preview.insighthunter.com"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "insighthunter-preview"
database_id = "ea438ef9-559b-4b94-ad70-e418bc4e896d"

[env.local.vars]
ENVIRONMENT = "development"
APP_URL = "http://localhost:8787"