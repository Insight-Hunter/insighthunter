# wrangler.toml — BizForma Cloudflare Worker Configuration

name = "insighthunter-bizforma"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── Routes ───────────────────────────────────────────────────────────────
[[routes]]
pattern = "bizforma.insighthunter.app/*"
zone_name = "insighthunter.app"

# ── Static Assets (React SPA) ────────────────────────────────────────────
[assets]
directory = "./dist/"
not_found_handling = "single-page-application"
binding = "ASSETS"

# ── KV Namespaces ────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "af7391791e95423b82c1cd877c0992e3"

# ── D1 Database ──────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-bizforma"
database_id = "ab885914-020c-47fa-b269-ce15710d2ffb"

# ── R2 Buckets ───────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "ih-bizforma-docs"

# ── Analytics Engine ─────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "BIZ_EVENTS"
dataset = "ih_bizforma_events"

# ── Durable Objects ──────────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "FORMATION_AGENT", class_name = "FormationAgent" },
  { name = "COMPLIANCE_AGENT", class_name = "ComplianceAgent" }
]

# ── Durable Object Migrations ────────────────────────────────────────────
[[migrations]]
tag = "v1"
new_classes = ["FormationAgent", "ComplianceAgent"]

# ── AI Binding ───────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
BOOKKEEPING_WORKER_URL = "https://insighthunter-bookkeeping.18c8e61a3669253dcfd0c7eec6be36a3.workers.dev"

# ── Development Settings ─────────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ── Secrets (set via Wrangler CLI) ───────────────────────────────────────
# wrangler secret put JWT_SECRET
# wrangler secret put CLAUDE_API_KEY
