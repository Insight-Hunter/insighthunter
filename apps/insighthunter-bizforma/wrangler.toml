# wrangler.toml — BizForma Cloudflare Worker Configuration

name            = "bizforma"
main            = "src/worker.ts"
compatibility_date  = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────────
[observability]
enabled           = true
head_sampling_rate = 1

# ── Static Assets (React SPA) ────────────────────────────────────────────────
[assets]
directory               = "./dist/"
not_found_handling      = "single-page-application"
binding                 = "ASSETS"

# ── KV Namespaces ────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "BIZFORMA_KV"
id         = "af7391791e95423b82c1cd877c0992e3"
preview_id = "af7391791e95423b82c1cd877c0992e3"

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "bizforma-db"
database_id = "a388931a-e89c-4860-8433-d02f4a478332"

[[r2_buckets]]
binding = "R2_DOCS"
bucket_name = "bizforma-documents"

[[durable_objects.bindings]]
name = "FORMATION_AGENT"
class_name = "FormationAgent"

[[durable_objects.bindings]]
name = "COMPLIANCE_AGENT"
class_name = "ComplianceAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FormationAgent", "ComplianceAgent"]

# ── Workers AI ───────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Analytics Engine ─────────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "bizforma_events"

# ── Environment Variables ─────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ── Development Overrides ────────────────────────────────────────────────────
[env.development]
name = "bizforma-dev"

[env.development.vars]
ENVIRONMENT = "development"

# ── Staging Overrides ─────────────────────────────────────────────────────────
[env.staging]
name = "bizforma-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
