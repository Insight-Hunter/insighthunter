name            = "insighthunter-bizforma"
main            = "src/worker.ts"
compatibility_date  = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

routes = [{ pattern = "bizforma.insighthunter.app/*", zone_name = "insighthunter.app" }]

# ── Static Assets (React SPA) ────────────────────────────────────────────────
[assets]
directory               = "./dist/"
not_found_handling      = "single-page-application"
binding                 = "ASSETS"

# ── KV Namespaces ────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding    = "BIZFORMA_KV"
id         = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "af7391791e95423b82c1cd877c0992e3"

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "insighthunter-bizforma"
database_id   = "ab885914-020c-47fa-b269-ce15710d2ffb"

# ── R2 Buckets ───────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "R2_DOCS"
bucket_name = "bizforma-documents"

# ── Durable Objects ──────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "FORMATION_AGENT"
class_name = "FormationAgent"

[[durable_objects.bindings]]
name = "COMPLIANCE_AGENT"
class_name = "ComplianceAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FormationAgent", "ComplianceAgent"]

# ── Workers AI ───────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Analytics Engine ─────────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "bizforma_events"

# ── Environment Variables ─────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"

# ── Development Overrides ────────────────────────────────────────────────────
[env.development]
name = "bizforma-dev"

[env.development.vars]
ENVIRONMENT = "development"

# ── Staging Overrides ─────────────────────────────────────────────────────────
[env.staging]
name = "bizforma-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
