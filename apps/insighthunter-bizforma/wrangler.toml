
name = "insighthunter-bizforma"
main = "src/backend/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# Secrets to set:
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put JWT_SECRET
# wrangler secret put APP_URL  (https://insighthunter.app)

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "bizforma-db"
database_id = "a388931a-e89c-4860-8433-d02f4a478332"

[[r2_buckets]]
binding = "R2_DOCS"
bucket_name = "bizforma-documents"

[[kv_namespaces]]
binding = "CACHE"
id = "af7391791e95423b82c1cd877c0992e3"

[[durable_objects.bindings]]
name = "FORMATION_AGENT"
class_name = "FormationAgent"

[[durable_objects.bindings]]
name = "COMPLIANCE_AGENT"
class_name = "ComplianceAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FormationAgent", "ComplianceAgent"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "bizforma-requests"

[vars]
AUTH_WORKER_URL = "https://auth.insighthunter.workers.dev"
