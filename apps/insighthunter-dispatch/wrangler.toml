# wrangler.toml — Dispatch Cloudflare Worker Configuration

name = "insighthunter-dispatch"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── Dispatch Namespace ───────────────────────────────────────────────────
[[dispatch_namespaces]]
binding = "DISPATCH"
namespace = "insighthunter-tenants"
outbound = { service = "insighthunter-auth", parameters = ["orgId"] }

# ── Service Bindings ─────────────────────────────────────────────────────
[[services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[[services]]
binding = "BOOKKEEPING_WORKER"
service = "insighthunter-bookkeeping"

[[services]]
binding = "INSIGHTS_WORKER"
service = "insighthunter-insights"

[[services]]
binding = "REPORTS_WORKER"
service = "insighthunter-reports"

[[services]]
binding = "NOTIFICATIONS_WORKER"
service = "insighthunter-notifications"

[[services]]
binding = "PAYROLL_WORKER"
service = "insighthunter-payroll"

[[services]]
binding = "PBX_WORKER"
service = "insighthunter-pbx"

# ── Analytics Engine ─────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "insighthunter_events"

# ── Routes ───────────────────────────────────────────────────────────────
[[routes]]
pattern = "insighthunter.app/api/*"
zone_name = "insighthunter.app"

[[routes]]
pattern = "*.insighthunter.app/*"
zone_name = "insighthunter.app"
