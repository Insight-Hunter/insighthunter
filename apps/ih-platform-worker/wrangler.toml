name = "ih-platform-worker"
main = "src/worker.ts"
compatibility_date = "2025-04-01"

[observability]
enabled = true

[[dispatch_namespaces]]
binding = "DISPATCH_NS"
namespace = "ih-apps"

[[kv_namespaces]]
binding = "IH_REGISTRY"
id = "894edb7e9e5a4f00b191aec4ae0716c4"

[[d1_databases]]
binding = "IH_PLATFORM_DB"
database_name = "ih-platform-db"
database_id = "eb034589-7f38-4f1f-af73-259d762c6b35"

[vars]
CF_ACCOUNT_ID = "18c8e61a3669253dcfd0c7eec6be36a3"

# Secrets (set via: wrangler secret put JWT_SECRET, CF_API_TOKEN)
# JWT_SECRET, CF_API_TOKEN

[triggers]
crons = []
