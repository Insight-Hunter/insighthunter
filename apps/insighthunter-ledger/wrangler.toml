# wrangler.toml — Ledger Cloudflare Worker Configuration

name = "insighthunter-ledger"
main = "workers/api/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Routes ───────────────────────────────────────────────────────────────
[[routes]]
pattern = "ledger.insighthunter.app/api/*"
zone_name = "insighthunter.app"

# ── D1 Database ──────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ih-ledger"
database_id = "d3a7b6e4-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

# ── Queue Producers ──────────────────────────────────────────────────────
[[queues.producers]]
binding = "RULES_QUEUE"
queue = "ih-ledger-rules"

[[queues.producers]]
binding = "SYNC_QUEUE"
queue = "ih-ledger-sync"

[[queues.producers]]
binding = "NOTIFICATIONS"
queue = "ih-notifications"

# ── Workflows ────────────────────────────────────────────────────────────
[[workflows]]
binding = "CLOSE_WORKFLOW"
name = "ih-ledger-close"
class_name = "MonthEndCloseWorkflow"
script_name = "workers/close/index.ts"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
AUTH_ORIGIN = "https://auth.insighthunter.app"

# ── Rules Worker ─────────────────────────────────────────────────────────
[workers.rules]
name = "ih-ledger-rules"
main = "workers/rules/index.ts"

[[workers.rules.queues.consumers]]
queue = "ih-ledger-rules"
max_batch_size = 10
max_retries = 3

[workers.rules.ai]
binding = "AI"

[[workers.rules.d1_databases]]
binding = "DB"
database_name = "ih-ledger"
database_id = "d3a7b6e4-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

[[workers.rules.queues.producers]]
binding = "NOTIFICATIONS"
queue = "ih-notifications"

# ── Sync Worker ──────────────────────────────────────────────────────────
[workers.sync]
name = "ih-ledger-sync"
main = "workers/sync/index.ts"

[[workers.sync.queues.consumers]]
queue = "ih-ledger-sync"
max_batch_size = 5
max_retries = 5

[[workers.sync.d1_databases]]
binding = "DB"
database_name = "ih-ledger"
database_id = "d3a7b6e4-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

[[workers.sync.queues.producers]]
binding = "NOTIFICATIONS"
queue = "ih-notifications"
