name = "tenant-template"
main = "src/worker.ts"
compatibility_date = "2025-04-01"

[observability]
enabled = true

[[routes]]
pattern = "workers.insighthunter.app/*"
zone_name = "insighthunter.app"

[[kv_namespaces]]
binding = "IH_TENANT_KV"
id = "REPLACE_AT_PROVISION_TIME"

[[d1_databases]]
binding = "IH_TENANT_DB"
database_name = "ih-tenant-TEMPLATE"
database_id = "REPLACE_AT_PROVISION_TIME"

[[r2_buckets]]
binding = "IH_DOCS"
bucket_name = "ih-docs"

[vars]
ORG_ID = "REPLACE_AT_PROVISION_TIME"
ORG_TIER = "lite"

# Secrets: JWT_SECRET (same as platform)