# wrangler.toml — Payroll Cloudflare Worker Configuration

name = "insighthunter-payroll"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── D1 Database ──────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-payroll"
database_id = "6a8d3e2b-1c3b-4d2b-8d2b-6a8d3e2b1c3b"

# ── R2 Buckets ───────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "PAY_STUBS"
bucket_name = "ih-pay-stubs"

# ── KV Namespaces ────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "PAYROLL_CACHE"
id = "ee5fe66bba9341c3b34bf7f9aab6bba8"

# ── Queue Producers ──────────────────────────────────────────────────────
[[queues.producers]]
binding = "PAYROLL_QUEUE"
queue = "ih-payroll-queue"

# ── Queue Consumers ──────────────────────────────────────────────────────
[[queues.consumers]]
queue = "ih-payroll-queue"
max_batch_size = 10
max_retries = 3
dead_letter_queue = "ih-payroll-dlq"

# ── Analytics Engine ─────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "PAYROLL_EVENTS"
dataset = "ih_payroll_events"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
