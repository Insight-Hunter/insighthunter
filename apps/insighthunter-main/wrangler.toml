name            = "insighthunter-pbx"
main            = "src/index.ts"
compatibility_date  = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ─────────────────────────────────────────────
[observability]
enabled            = true
head_sampling_rate = 1

# ── Bindings ──────────────────────────────────────────────────
[[d1_databases]]
binding       = "PBX_DB"
database_name = "insighthunter-pbx"
database_id   = "<YOUR_D1_ID>"

[[r2_buckets]]
binding     = "PBX_AUDIO"
bucket_name = "insighthunter-pbx-audio"

[[kv_namespaces]]
binding = "PBX_KV"
id      = "<YOUR_KV_ID>"

[ai]
binding = "AI"

# ── Durable Objects ───────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "CALL_SESSION", class_name = "CallSessionDO" }
]

[[migrations]]
tag               = "v1"
new_sqlite_classes = []

[[migrations]]
tag         = "v2"
new_classes = ["CallSessionDO"]

# ── Vars (non-secret config) ──────────────────────────────────
[vars]
TELNYX_SIP_CONNECTION_ID = ""
TELNYX_CREDENTIAL_ID     = ""
# Note: TELNYX_SIP_PROFILE_ID removed — connection_id is per-tenant in D1

# ── Routes ────────────────────────────────────────────────────
[[routes]]
pattern   = "pbx-api.insighthunter.app/*"
zone_name = "insighthunter.app"

# ── Secrets (set via CLI — never committed) ───────────────────
# wrangler secret put TELNYX_API_KEY
# wrangler secret put TELNYX_WEBHOOK_SECRET
# wrangler secret put JWT_SECRET
# wrangler secret put STRIPE_PK        ← Stripe publishable key (pk_live_...)
