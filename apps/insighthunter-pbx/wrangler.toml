name = "insighthunter-pbx"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "PBX_ROOM", class_name = "PBXRoom", script_name = "insighthunter-pbx" }
]

[[migrations]]
tag = "v1"
new_classes = ["PBXRoom"]

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-pbx"
database_id = "REPLACE_WITH_D1_ID"
migrations_dir = "migrations"

[vars]
ENVIRONMENT = "production"

[env.preview]
name = "insighthunter-pbx-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
