# apps/insighthunter-pbx/wrangler.toml

name                 = "insighthunter-pbx"
main                 = "src/index.ts"
compatibility_date   = "2025-03-01"
compatibility_flags  = ["nodejs_compat"]

[observability]
enabled = true

# ── Durable Objects ───────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name       = "CALL_SESSION"
class_name = "CallSessionDO"

[[migrations]]
tag         = "v1"
new_classes = ["CallSessionDO"]

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "PBX_DB"
database_name = "pbx-db"
database_id   = "<your-d1-id>"          # wrangler d1 create pbx-db

# ── R2 Bucket ─────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "PBX_AUDIO"
bucket_name = "pbx-audio"               # wrangler r2 bucket create pbx-audio

# ── KV Namespace ──────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "PBX_KV"
id      = "<your-kv-id>"                # wrangler kv namespace create pbx-kv

# ── Queues ────────────────────────────────────────────────────────────────────
[[queues.producers]]
binding = "VM_QUEUE"
queue   = "pbx-vm-transcription"        # wrangler queues create pbx-vm-transcription

[[queues.consumers]]
queue             = "pbx-vm-transcription"
max_batch_size    = 5
max_batch_timeout = 30

# ── Workers AI ────────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Analytics Engine ──────────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pbx_events"

# ── Environment variables (non-secret) ───────────────────────────────────────
# Secrets are set via `wrangler secret put` — never committed to source control.
# Listed here as documentation only.
#
# wrangler secret put TELNYX_API_KEY
# wrangler secret put TELNYX_WEBHOOK_SECRET
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put STRIPE_PK
# wrangler secret put JWT_SECRET

# ── Local dev overrides (.dev.vars file — git-ignored) ───────────────────────
# Create apps/insighthunter-pbx/.dev.vars with:
#
# TELNYX_API_KEY        = "KEYxxx"
# TELNYX_WEBHOOK_SECRET = "xxx"
# STRIPE_SECRET_KEY     = "sk_test_xxx"
# STRIPE_WEBHOOK_SECRET = "whsec_xxx"
# STRIPE_PK             = "pk_test_xxx"
# JWT_SECRET            = "dev-secret-change-in-prod"

# ── Staging environment ───────────────────────────────────────────────────────
[env.staging]
name = "insighthunter-pbx-staging"

[[env.staging.d1_databases]]
binding       = "PBX_DB"
database_name = "pbx-db-staging"
database_id   = "<your-staging-d1-id>"

[[env.staging.r2_buckets]]
binding     = "PBX_AUDIO"
bucket_name = "pbx-audio-staging"

[[env.staging.kv_namespaces]]
binding = "PBX_KV"
id      = "<your-staging-kv-id>"

[[env.staging.queues.producers]]
binding = "VM_QUEUE"
queue   = "pbx-vm-transcription-staging"

[[env.staging.queues.consumers]]
queue             = "pbx-vm-transcription-staging"
max_batch_size    = 5
max_batch_timeout = 30

[env.staging.ai]
binding = "AI"

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pbx_events_staging"

[[env.staging.durable_objects.bindings]]
name       = "CALL_SESSION"
class_name = "CallSessionDO"

[[env.staging.migrations]]
tag         = "v1"
new_classes = ["CallSessionDO"]

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name   = "insighthunter-pbx"
routes = [
  { pattern = "pbx-api.insighthunter.app/*", zone_name = "insighthunter.app" }
]

[[env.production.d1_databases]]
binding       = "PBX_DB"
database_name = "pbx-db"
database_id   = "<your-d1-id>"

[[env.production.r2_buckets]]
binding     = "PBX_AUDIO"
bucket_name = "pbx-audio"

[[env.production.kv_namespaces]]
binding = "PBX_KV"
id      = "<your-kv-id>"

[[env.production.queues.producers]]
binding = "VM_QUEUE"
queue   = "pbx-vm-transcription"

[[env.production.queues.consumers]]
queue             = "pbx-vm-transcription"
max_batch_size    = 5
max_batch_timeout = 30

[env.production.ai]
binding = "AI"

[[env.production.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "pbx_events"

[[env.production.durable_objects.bindings]]
name       = "CALL_SESSION"
class_name = "CallSessionDO"

[[env.production.migrations]]
tag         = "v1"
new_classes = ["CallSessionDO"]

