name               = "insighthunter-auth"
main               = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# D1 — users, sessions, roles
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-auth-db"
database_id = "1b58d27d-77c0-481d-a490-0c043f0e063c"
migrations_dir = "migrations"

# KV — session tokens + reset tokens + email verification
[[kv_namespaces]]
binding    = "SESSIONS"
id         = "60e34ba310ca40c79edec05470c7a271"
preview_id = "60e34ba310ca40c79edec05470c7a271"

[[kv_namespaces]]
binding    = "TOKENS"
id         = "029a6b1c13a24c89b0dbd39e4b5f6021"
preview_id = "029a6b1c13a24c89b0dbd39e4b5f6021"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "8ac9bbaeda4d410db31878ebb8b8a3f1"
preview_id = "8ac9bbaeda4d410db31878ebb8b8a3f1"

# Analytics Engine — auth events
[[analytics_engine_datasets]]
binding = "EVENTS"
dataset = "insighthunter_auth_events"

[[services]]
binding = "AUTH_WORKER"
service = "insighthunter-auth"

[vars]
APP_ENV             = "production"
APP_URL             = "https://insighthunter.app"
CORS_ORIGIN         = "https://insighthunter.app"
JWT_EXPIRY          = "3600"
REFRESH_EXPIRY      = "2592000"
RATE_LIMIT_WINDOW   = "60"
RATE_LIMIT_MAX      = "20"
BCRYPT_ROUNDS       = "12"
SITE_URL = "https://insighthunter.app"

# Secrets — add via: wrangler secret put SECRET_NAME
# Required: JWT_SECRET, REFRESH_SECRET, MAILCHANNELS_API_KEY (or RESEND_API_KEY)
# Secrets (set via CLI — never commit):
# wrangler secret put JWT_SECRET
# wrangler secret put RESEND_API_KEY
