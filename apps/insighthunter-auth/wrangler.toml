name = "insighthunter-auth"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

# These bindings are illustrative. Actual values might differ.
kv_namespaces = [
  { binding = "AUTH_KV", id = "..." }
]

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-auth"
database_id = "..."

[vars]
SITE_URL = "https://insighthunter.app"