name = "ih-auth-worker"
main = "src/worker.ts"
compatibility_date = "2025-04-01"

[observability]
enabled = true

routes = [{ pattern = "auth.insighthunter.app/*", zone_name = "insighthunter.app" }]

[[d1_databases]]
binding = "IH_AUTH_DB"
database_name = "ih-auth-db"
database_id = "REPLACE_WITH_D1_ID"

[[kv_namespaces]]
binding = "IH_AUTH_KV"
id = "REPLACE_WITH_KV_ID"

[[queues.producers]]
binding = "IH_WELCOME_QUEUE"
queue = "ih-welcome-queue"

[ai]
binding = "AI"

# Secrets: JWT_SECRET, PLATFORM_SERVICE_TOKEN, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
