name            = "insighthunter-auth"
main            = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# ── Routes ────────────────────────────────────────────────
[[routes]]
pattern  = "auth.insighthunter.app/*"
zone_name = "insighthunter.app"
custom_domain = true

[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-auth"
database_id = "36b4a6b7-3509-4cd2-9cdc-7a35990affd5"

[[kv_namespaces]]
binding = "SESSIONS"
id = "60e34ba310ca40c79edec05470c7a271"

[[kv_namespaces]]
binding = "REFRESH_TOKENS"
id = "ba8d224a437949969d990db3aef71a87"

[[analytics_engine_datasets]]
binding = "AUTH_EVENTS"
dataset = "ih_auth_events"

# ── Cloudflare Email Service (native — no third-party API key) ──
[[send_email]]
name = "EMAIL"

[vars]
ENVIRONMENT = "production"
ACCESS_TOKEN_TTL = "3600"
REFRESH_TOKEN_TTL = "2592000"
APP_ORIGIN = "https://insighthunter.app"
APP_URL = "https://app.insighthunter.app"
COOKIE_DOMAIN = "insighthunter.app"
TEAM_DOMAIN = "https://insighthunter.cloudflareaccess.com"
POLICY_AUD  = "e677d6d97923267e3221ccd0294dcb747c9c15a047c48812242abe0eda7eb395"
