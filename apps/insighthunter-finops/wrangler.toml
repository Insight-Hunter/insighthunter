# wrangler.toml — FinOps Cloudflare Worker Configuration

name = "insighthunter-finops"
main = "workers/api/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true

# ── Routes ───────────────────────────────────────────────────────────────
[[routes]]
pattern = "finops.insighthunter.app/api/*"
zone_name = "insighthunter.app"

# ── D1 Databases ─────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "ih-finops"
database_id = "5e3e2b1c-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

[[d1_databases]]
binding = "ADVISOR_DB"
database_name = "ih-advisor"
database_id = "2c5fabdf-eef2-4ca8-bb15-99e83e613460"

# ── R2 Buckets ───────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "DOCS"
bucket_name = "ih-documents"

# ── Queue Producers ──────────────────────────────────────────────────────
[[queues.producers]]
binding = "APPROVALS_WORKFLOW"
queue = "ih-finops-approvals"

[[queues.producers]]
binding = "RECEIPT_QUEUE"
queue = "ih-finops-receipts"

[[queues.producers]]
binding = "REMINDER_QUEUE"
queue = "ih-finops-reminders"

[[queues.producers]]
binding = "PDF_QUEUE"
queue = "ih-finops-pdf"

[[queues.producers]]
binding = "NOTIFICATIONS"
queue = "ih-notifications"

# ── Workflows ────────────────────────────────────────────────────────────
[[workflows]]
binding = "APPROVALS_WORKFLOW"
name = "ih-finops-approvals"
class_name = "BillApprovalWorkflow"
script_name = "workers/approvals/index.ts"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
AUTH_ORIGIN = "https://auth.insighthunter.app"

# ── Receipts Worker ──────────────────────────────────────────────────────
[workers.receipts]
name = "ih-finops-receipts"
main = "workers/receipts/index.ts"

[[workers.receipts.queues.consumers]]
queue = "ih-finops-receipts"
max_batch_size = 5
max_retries = 3

[workers.receipts.ai]
binding = "AI"

[[workers.receipts.r2_buckets]]
binding = "DOCS"
bucket_name = "ih-documents"

[[workers.receipts.d1_databases]]
binding = "DB"
database_name = "ih-finops"
database_id = "5e3e2b1c-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

# ── PDF Worker ───────────────────────────────────────────────────────────
[workers.pdf]
name = "ih-finops-pdf"
main = "workers/pdf/index.ts"

[[workers.pdf.queues.consumers]]
queue = "ih-finops-pdf"
max_batch_size = 3
max_retries = 3

[workers.pdf.browser_rendering]
binding = "BROWSER"

[[workers.pdf.r2_buckets]]
binding = "DOCS"
bucket_name = "ih-documents"

[[workers.pdf.d1_databases]]
binding = "DB"
database_name = "ih-finops"
database_id = "5e3e2b1c-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

# ── Reminders Worker ─────────────────────────────────────────────────────
[workers.reminders]
name = "ih-finops-reminders"
main = "workers/reminders/index.ts"
crons = ["0 8 * * *"]

[[workers.reminders.d1_databases]]
binding = "DB"
database_name = "ih-finops"
database_id = "5e3e2b1c-3b2d-4c1d-8d2b-5e3e2b1c3b2d"

[[workers.reminders.queues.producers]]
binding = "NOTIFICATIONS"
queue = "ih-notifications"
