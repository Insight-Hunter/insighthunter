# wrangler.toml — Notifications Cloudflare Worker Configuration

name = "insighthunter-notifications"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── KV Namespaces ────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "NOTIFS_KV"
id = "4cf7da9cbe34464fae132705ffc08c9d"
preview_id = "a3858389af5649fe899eec6450ae6b88"

# ── D1 Database ──────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-db"
database_id = "a68f31d8-99fb-4e88-adc8-26ed1be54ca2"

# ── Analytics Engine ─────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "insighthunter_events"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
AUTH_WORKER_URL = "https://auth.insighthunter.app"
MAILCHANNELS_URL = "https://api.mailchannels.net/tx/v1/send"
FROM_EMAIL = "noreply@insighthunter.app"
FROM_NAME = "Insight Hunter"
