# wrangler.toml — AI Insights Cloudflare Worker Configuration

name = "insighthunter-insights"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── D1 Database ──────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-insights"
database_id = "dbded017-25e8-4559-a351-cbaeea01e4b2"
# ── Durable Objects ──────────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "CFO_AGENT", class_name = "CfoAgent" }
]
[[migrations]]
tag = "v1"
new_classes = ["CfoAgent"]
# ── KV Namespaces ────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "USAGE"
id = "bd5a717a1a04472a83c903f723f17214"

# ── AI Binding ───────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Vectorize Index ──────────────────────────────────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "ih-financial-docs"

# ── Analytics Engine ─────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "AI_EVENTS"
dataset = "ih_ai_events"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
EMBED_MODEL = "@cf/baai/bge-small-en-v1.5"
CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"

# ── Secrets (set via wrangler secret put): JWT_SECRET ───────────────────
