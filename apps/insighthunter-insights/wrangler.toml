# wrangler.toml — AI Insights Cloudflare Worker Configuration

name = "insighthunter-insights"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

# ── Observability ────────────────────────────────────────────────────────
[observability]
enabled = true
head_sampling_rate = 1

# ── D1 Database ──────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "insighthunter-insights"
database_id = "REPLACE_AFTER_PROVISION"

# ── KV Namespaces ────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "USAGE"
id = "REPLACE_AFTER_PROVISION"

# ── AI Binding ───────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Vectorize Index ──────────────────────────────────────────────────────
[[vectorize]]
binding = "VECTORIZE"
index_name = "ih-financial-docs"

# ── Analytics Engine ─────────────────────────────────────────────────────
[[analytics_engine_datasets]]
binding = "AI_EVENTS"
dataset = "ih_ai_events"

# ── Environment Variables ────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
EMBED_MODEL = "@cf/baai/bge-small-en-v1.5"
CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"

# ── Secrets (set via wrangler secret put): JWT_SECRET ───────────────────
