<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1117;--navy-2:#0F1929;--navy-3:#141E30;--navy-card:#161B22;--navy-border:#1E2A3A;
  --gold:#C9972B;--gold-l:#D4A843;--gold-d:#8A6820;
  --white:#FFF;--g1:#E2E8F0;--g2:#94A3B8;--g3:#64748B;--g4:#334155;
  --green:#10B981;--red:#EF4444;--blue:#3B82F6;--amber:#F59E0B}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh}
a{color:inherit;text-decoration:none}

body{display:flex;flex-direction:column;min-height:100vh}
.dash-layout{display:flex;flex:1;padding-top:64px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:64px;background:rgba(13,17,23,.97);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--navy-border)}
.sidebar{width:220px;flex-shrink:0;background:var(--navy-card);border-right:1px solid var(--navy-border);
  position:fixed;top:64px;left:0;bottom:0;overflow-y:auto;padding:1.25rem .75rem;
  display:flex;flex-direction:column;gap:.25rem;z-index:50}
.sidebar-label{font-size:.6rem;font-weight:700;color:var(--g3);text-transform:uppercase;
  letter-spacing:.1em;padding:.75rem .65rem .35rem}
.sidebar a{display:flex;align-items:center;gap:.65rem;padding:.55rem .65rem;border-radius:8px;
  font-size:.82rem;font-weight:500;color:var(--g2);transition:.15s;text-decoration:none}
.sidebar a:hover{background:var(--navy-border);color:var(--white)}
.sidebar a.active{background:rgba(201,151,43,.1);color:var(--gold-l);border:1px solid rgba(201,151,43,.2)}
.sidebar-icon{width:16px;height:16px;flex-shrink:0}
.dash-main{margin-left:220px;flex:1;padding:2rem clamp(1rem,3vw,2rem);max-width:100%}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.dash-title{font-size:1.4rem;font-weight:800;letter-spacing:-.02em}
.dash-sub{font-size:.82rem;color:var(--g3);margin-top:.15rem}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.75rem}
.kpi{background:var(--navy-card);border:1px solid var(--navy-border);border-radius:12px;padding:1.25rem}
.kpi-label{font-size:.68rem;color:var(--g3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
.kpi-value{font-size:1.6rem;font-weight:800;letter-spacing:-.03em}
.kpi-delta{font-size:.72rem;margin-top:.25rem}
.kpi-delta.up{color:var(--green)}.kpi-delta.down{color:var(--red)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
.panel{background:var(--navy-card);border:1px solid var(--navy-border);border-radius:12px;padding:1.25rem}
.panel-title{font-size:.75rem;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.table-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;
  border-bottom:1px solid var(--navy-border);font-size:.82rem}
.table-row:last-child{border:none}
.pill-badge{padding:2px 8px;border-radius:100px;font-size:.65rem;font-weight:600}
.pill-green{background:rgba(16,185,129,.12);color:var(--green)}
.pill-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.pill-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.pill-red{background:rgba(239,68,68,.12);color:var(--red)}
.chart-placeholder{height:140px;border-radius:8px;background:var(--navy-3);position:relative;
  overflow:hidden;display:flex;align-items:flex-end;gap:4px;padding:1rem .75rem .75rem}
.bar{border-radius:4px 4px 0 0;background:rgba(201,151,43,.3);flex:1;transition:.3s}
.bar.active{background:var(--gold)}
.btn-gold{padding:.45rem 1.25rem;border-radius:8px;background:var(--gold);color:var(--navy);
  font-size:.875rem;font-weight:700;cursor:pointer;border:none;transition:.2s;display:inline-block}
.btn-gold:hover{background:var(--gold-l)}
/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--navy-border) 25%,var(--navy-3) 50%,var(--navy-border) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;padding:.75rem 1.25rem;border-radius:10px;
  font-size:.82rem;font-weight:600;display:none;animation:slideUp .25s ease;
  box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{display:block}
.toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6EE7B7}
.toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:1024px){.kpi-row{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.sidebar{display:none}.dash-main{margin-left:0}.grid-2{grid-template-columns:1fr}}
</style>
</head>

<script>
const API = '/api'
function toast(msg, type='success') {
  const t = document.getElementById('toast')
  t.textContent = msg; t.className = `toast show ${type}`
  setTimeout(() => t.className = 'toast', 3200)
}
function fmt(n) { return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n) }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) }
</script>

<script>
async function loadReports() {
  const res = await fetch(API + '/bookkeeping/summary', { credentials:'include' })
  if (!res.ok) return
  const { summary } = await res.json()
  const income   = summary.total_income   ?? 0
  const expenses = summary.total_expenses ?? 0
  const net      = income - expenses
  const margin   = income > 0 ? Math.round((net/income)*100) : 0
  document.getElementById('rpt-revenue').textContent = fmt(income)
  document.getElementById('rpt-gross').textContent   = fmt(income * .905)
  document.getElementById('rpt-net').textContent     = fmt(net)
  document.getElementById('rpt-margin').textContent  = margin + '%'
  document.getElementById('pl-table').innerHTML = `
    <div class="table-row" style="font-weight:700"><span>Revenue</span><span style="color:var(--green)">${fmt(income)}</span></div>
    <div class="table-row"><span style="color:var(--g3);padding-left:1rem">Service Revenue</span><span>${fmt(income*.85)}</span></div>
    <div class="table-row"><span style="color:var(--g3);padding-left:1rem">Other Income</span><span>${fmt(income*.15)}</span></div>
    <div class="table-row" style="font-weight:700"><span>Cost of Goods Sold</span><span style="color:var(--red)">-${fmt(income*.095)}</span></div>
    <div class="table-row" style="font-weight:700;color:var(--green)"><span>Gross Profit</span><span>${fmt(income*.905)}</span></div>
    <div class="table-row" style="font-weight:700"><span>Operating Expenses</span><span style="color:var(--red)">-${fmt(expenses)}</span></div>
    <div class="table-row" style="font-weight:700;font-size:1rem;padding:.75rem 0"><span>Net Income</span><span style="color:${net>=0?'var(--green)':'var(--red)'};">${fmt(net)}</span></div>`
  document.querySelectorAll('.skeleton').forEach(el => el.classList.remove('skeleton'))
}
function exportReport() { toast('PDF export coming soon — use browser Print → Save as PDF for now') }
loadReports()
</script>
