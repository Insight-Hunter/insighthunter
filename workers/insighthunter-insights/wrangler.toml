name = "insighthunter-ai"
main = "src/index.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat", "nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://insighthunter.app,https://auth.insighthunter.app"
CHAT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
