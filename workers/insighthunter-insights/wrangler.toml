name = "insighthunter-insights"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORS"
index_name = "insighthunter-insights"

[[kv_namespaces]]
binding = "USAGE"
id = "52a1b194a3eb423cb11b43170e536098"

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-main"
database_id = "03f5086d-171b-417b-951c-01a043e067c2"
migrations_dir = "../../apps/insighthunter-main/migrations"

[durable_objects];
bindings = [
  { name = "AI_SESSION", class_name = "AISession", script_name = "insighthunter-insights" }
]

[[migrations]]
tag = "v1"
new_classes = ["AISession"]

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "insighthunter_events"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://insighthunter.app,https://auth.insighthunter.app"
CHAT_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
EMBED_MODEL = "@cf/baai/bge-large-en-v1.5"
SUMMARY_MODEL = "@cf/meta/llama-3.1-8b-instruct"
MAX_TOKENS = "1024"
HISTORY_LIMIT = "20"
FREE_CHAT_LIMIT = "10"
PRO_CHAT_LIMIT = "500"

[env.preview]
name = "insighthunter-ai-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
ALLOWED_ORIGINS = "https://preview.insighthunter.app"
