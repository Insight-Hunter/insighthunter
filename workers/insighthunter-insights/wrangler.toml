MAX_TOKENS = "1024"
HISTORY_LIMIT = "20"
FREE_CHAT_LIMIT = "10"
PRO_CHAT_LIMIT = "500"

[env]

[env.preview]
name = "insighthunter-ai-preview"

[env.preview.vars]
ENVIRONMENT = "preview"
ALLOWED_ORIGINS = "https://preview.insighthunter.app"

[[vectorize]]
binding = "VECTORS"
index_name = "insighthunter-insights"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ih-financial-docs"

[[kv_namespaces]]
binding = "USAGE"
id = "REPLACE_AFTER_PROVISION"

[[d1_databases]]
binding = "DB"
database_name = "insighthunter-ai"
